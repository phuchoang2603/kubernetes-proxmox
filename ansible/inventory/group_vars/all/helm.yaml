# Helm applications configuration
# All applications deployed via HelmChart CRD (RKE2)
helm_applications:
  # cert-manager: Certificate management for Kubernetes
  - name: cert-manager
    chart: cert-manager
    version: v1.20.1
    repo: https://charts.jetstack.io
    namespace: cert-manager
    create_namespace: true
    set_values:
      crds.enabled: "true"
      extraArgs[0]: "--dns01-recursive-nameservers-only"
      extraArgs[1]: "--dns01-recursive-nameservers=1.1.1.1:53"
    additional_manifests:
      - cert-manager-issuer

  # traefik: Ingress controller and load balancer (required)
  - name: traefik
    chart: traefik
    repo: https://traefik.github.io/charts
    version: v39.0.7
    namespace: traefik
    create_namespace: true
    values_content: |
      service:
        type: LoadBalancer
        spec:
          loadBalancerIP: {{ vip_ingress_ip }}
      tlsStore:
        default:
          defaultCertificate:
            secretName: wildcard-tls
      ingressRoute:
        dashboard:
          enabled: true
          matchRule: Host(`traefik.{{ ssl_local_domain }}`)
          entryPoints: ["websecure"]
    additional_manifests:
      - traefik-wildcard-cert

  # longhorn: Distributed block storage for Kubernetes
  - name: longhorn
    chart: longhorn
    version: v1.11.1
    repo: https://charts.longhorn.io
    namespace: longhorn-system
    create_namespace: true
    values_content: |
      defaultSettings:
        createDefaultDiskLabeledNodes: "true"
        autoCleanupSystemGeneratedSnapshot: true
        replicaAutoBalance: best-effort
        snapshotDataIntegrity: fast-check
        storageOverProvisioningPercentage: 200
        storageMinimalAvailablePercentage: 25
      defaultBackupStore:
        backupTarget: "s3://longhorn@us-east-1/"
        backupTargetCredentialSecret: "longhorn-minio-credentials"
      persistence:
        defaultClass: true
        defaultClassReplicaCount: 1
        defaultDataLocality: best-effort
        reclaimPolicy: Delete
        migratable: false
        recurringJobSelector:
          enable: false
    ingress:
      enabled: true
      host: "longhorn.{{ ssl_local_domain }}"
      service_name: longhorn-frontend
      service_port: 80
    additional_manifests:
      - longhorn-iscsi
      - longhorn-nfs
      - longhorn-minio-cred
      - longhorn-storage-class
      - longhorn-recurringjob

  # external-secrets: Integrate external secret management systems
  - name: external-secrets
    chart: external-secrets
    version: v2.2.0
    repo: https://charts.external-secrets.io
    namespace: external-secrets
    create_namespace: true
    values_content: |
      installCRDs: true

      metrics:
        service:
          enabled: true

        serviceMonitor:
          enabled: true
    additional_manifests:
      - external-secrets-rbac
      - external-secrets-cluster-store

  # argo-cd: GitOps continuous delivery tool
  - name: argo-cd
    chart: argo-cd
    version: v9.4.17
    repo: https://argoproj.github.io/argo-helm
    namespace: argo-cd
    create_namespace: true
    values_content: |
      configs:
        params:
          server.insecure: true
    ingress:
      enabled: true
      host: "argo.{{ ssl_local_domain }}"
      service_name: argo-cd-argocd-server
      service_port: 80

  # harbor: Container registry for storing and managing Docker images
  - name: harbor
    chart: harbor
    version: v1.18.3
    repo: https://helm.goharbor.io
    namespace: harbor
    create_namespace: true
    values_content: |
      expose:
        type: ingress
        ingress:
          hosts:
            core: "harbor.{{ ssl_local_domain }}"
          annotations:
            kubernetes.io/ingress.class: traefik
            traefik.ingress.kubernetes.io/router.entrypoints: websecure
            traefik.ingress.kubernetes.io/router.tls: "true"
      persistence:
        persistentVolumeClaim:
          registry:
            size: 60Gi
            storageClass: "longhorn-default"
          jobservice:
            size: 1Gi
            storageClass: "longhorn-fast"
          database:
            size: 1Gi
            storageClass: "longhorn-default"
          redis:
            size: 1Gi
            storageClass: "longhorn-fast"
          trivy:
            size: 5Gi
            storageClass: "longhorn-fast"

  # victoria-logs-single: Log aggregation and analysis (VictoriaLogs)
  - name: victoria-logs-single
    chart: victoria-logs-single
    version: v0.11.31
    repo: https://victoriametrics.github.io/helm-charts
    namespace: monitoring
    create_namespace: true
    values_content: |
      server:
        service:
          ClusterIP: ""
        retentionPeriod: "1" # 1 month
        persistentVolume:
          storageClassName: "longhorn-default"
          size: 40Gi
        vmServiceScrape:
          enabled: true
          targetPort: http
        ingress:
          enabled: true
          hosts:
            - name: "logs.{{ ssl_local_domain }}"
              path: /
              port: http
          annotations:
            kubernetes.io/ingress.class: traefik
            traefik.ingress.kubernetes.io/router.entrypoints: websecure
            traefik.ingress.kubernetes.io/router.tls: "true"
      dashboards:
        enabled: true
        labels:
          grafana_dashboard: "1"
    additional_manifests:
      - victoria-logs-datasource

  # victoria-logs-collector: Log collection agent (VictoriaLogs Agent)
  - name: victoria-logs-collector
    chart: victoria-logs-collector
    version: v0.2.15
    repo: https://victoriametrics.github.io/helm-charts
    namespace: monitoring
    create_namespace: true
    values_content: |
      remoteWrite:
        - url: http://victoria-logs-single-server.monitoring.svc.cluster.local:9428

  # victoria-metrics-operator: Operator for managing VictoriaMetrics components
  - name: victoria-metrics-operator
    chart: victoria-metrics-operator
    version: v0.59.3
    repo: https://victoriametrics.github.io/helm-charts
    namespace: operator-system
    create_namespace: true
    values_content: |
      crds:
        plain: true
      operator:
        disable_prometheus_converter: false

  # victoria-metrics-k8s-stack: Metrics monitoring stack (VictoriaMetrics, Grafana, etc.)
  - name: victoria-metrics-k8s-stack
    chart: victoria-metrics-k8s-stack
    version: v0.72.6
    repo: https://victoriametrics.github.io/helm-charts
    namespace: monitoring
    create_namespace: true
    values_content: |
      victoria-metrics-operator:
        enabled: false
      prometheus-operator-crds:
        enabled: true
      vmsingle:
        enabled: true
        spec:
          retentionPeriod: "1" # 1 month
          replicaCount: 1
          storage:
            storageClassName: "longhorn-default"
            resources:
              requests:
                storage: 40Gi
        ingress:
          enabled: false
      vmagent:
        enabled: true
        spec:
          replicaCount: 1
          scrapeInterval: 20s
          # Drop original labels to save RAM as seen in your default
          extraArgs:
            promscrape.streamParse: "true"
            promscrape.dropOriginalLabels: "true"
      grafana:
        enabled: true
        grafana.ini:
          plugins:
            allow_loading_unsigned_plugins: victoriametrics-metrics-datasource,victoriametrics-logs-datasource
          server:
            domain: grafana.{{ ssl_local_domain }}
            root_url: https://grafana.{{ ssl_local_domain }}
            serve_from_sub_path: false
        ingress:
          enabled: true
          hosts:
            - grafana.{{ ssl_local_domain }}
          path: /
          annotations:
            kubernetes.io/ingress.class: traefik
            traefik.ingress.kubernetes.io/router.entrypoints: websecure
            traefik.ingress.kubernetes.io/router.tls: "true"
        vmServiceScrape:
          enabled: true
        plugins:
          - victoriametrics-metrics-datasource
          - victoriametrics-logs-datasource
        sidecar:
          datasources:
            enabled: true
            label: grafana_datasource
            labelValue: "1"
            searchNamespace: ALL
          dashboards:
            enabled: true
            searchNamespace: ALL
      alertmanager:
        enabled: false
      vmalert:
        enabled: false
