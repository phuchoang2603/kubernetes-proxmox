# Helm applications configuration
# All applications deployed via HelmChart CRD (RKE2)
helm_applications:
  # cert-manager: Certificate management for Kubernetes
  - name: cert-manager
    chart: cert-manager
    version: v1.20.1
    repo: https://charts.jetstack.io
    namespace: cert-manager
    create_namespace: true
    set_values:
      crds.enabled: "true"
      extraArgs[0]: "--dns01-recursive-nameservers-only"
      extraArgs[1]: "--dns01-recursive-nameservers=1.1.1.1:53"
    additional_manifests:
      - cert-manager-issuer

  # traefik: Ingress controller and load balancer (required)
  - name: traefik
    chart: traefik
    repo: https://traefik.github.io/charts
    version: v39.0.7
    namespace: traefik
    create_namespace: true
    values_content: |
      service:
        type: LoadBalancer
        spec:
          loadBalancerIP: {{ vip_ingress_ip }}
      tlsStore:
        default:
          defaultCertificate:
            secretName: wildcard-tls
      ingressRoute:
        dashboard:
          enabled: true
          matchRule: Host(`traefik.{{ ssl_local_domain }}`)
          entryPoints: ["websecure"]
    additional_manifests:
      - traefik-wildcard-cert

  # longhorn: Distributed block storage for Kubernetes
  - name: longhorn
    chart: longhorn
    version: v1.11.1
    repo: https://charts.longhorn.io
    namespace: longhorn-system
    create_namespace: true
    set_values:
      defaultSettings.createDefaultDiskLabeledNodes: "true"
      persistence.reclaimPolicy: "Retain"
    ingress:
      enabled: true
      host: "longhorn.{{ ssl_local_domain }}"
      service_name: longhorn-frontend
      service_port: 80
    additional_manifests:
      - longhorn-iscsi
      - longhorn-nfs

  # external-secrets: Integrate external secret management systems
  - name: external-secrets
    chart: external-secrets
    version: v2.2.0
    repo: https://charts.external-secrets.io
    namespace: external-secrets
    create_namespace: true
    values_content: |
      installCRDs: true

      metrics:
        service:
          enabled: true

        serviceMonitor:
          enabled: true
    additional_manifests:
      - external-secrets-rbac
      - external-secrets-cluster-store

  # argo-cd: GitOps continuous delivery tool
  - name: argo-cd
    chart: argo-cd
    version: v9.4.17
    repo: https://argoproj.github.io/argo-helm
    namespace: argo-cd
    create_namespace: true
    values_content: |
      configs:
        params:
          server.insecure: true
    ingress:
      enabled: true
      host: "argo.{{ ssl_local_domain }}"
      service_name: argo-cd-argocd-server
      service_port: 80

  # harbor: Container registry for storing and managing Docker images
  - name: harbor
    chart: harbor
    version: v1.18.3
    repo: https://helm.goharbor.io
    namespace: harbor
    create_namespace: true
    values_content: |
      expose:
        type: ingress
        ingress:
          hosts:
            core: "harbor.{{ ssl_local_domain }}"
          annotations:
            kubernetes.io/ingress.class: traefik
            traefik.ingress.kubernetes.io/router.entrypoints: websecure
            traefik.ingress.kubernetes.io/router.tls: "true"
      persistence:
        persistentVolumeClaim:
          registry:
            size: 100Gi

  # victoria-metrics-k8s-stack: Metrics monitoring stack (VictoriaMetrics, Grafana, etc.)
  - name: victoria-metrics-k8s-stack
    chart: victoria-metrics-k8s-stack
    version: v0.72.6
    repo: https://victoriametrics.github.io/helm-charts
    namespace: monitoring
    create_namespace: true
    values_content: |
      global:
        clusterLabel: management-cluster

      victoria-metrics-operator:
        operator:
          disable_prometheus_converter: false

      vmsingle:
        enabled: true
        spec:
          retentionPeriod: "1" # 1 month
          replicaCount: 1
          storage:
            storageClassName: "longhorn"
            resources:
              requests:
                storage: 40Gi

      vmagent:
        enabled: true
        spec:
          replicaCount: 1
          scrapeInterval: 20s
          # Drop original labels to save RAM as seen in your default
          extraArgs:
            promscrape.streamParse: "true"
            promscrape.dropOriginalLabels: "true"

      grafana:
        enabled: true
        grafana.ini:
          server:
            domain: grafana.{{ ssl_local_domain }}
            root_url: https://grafana.{{ ssl_local_domain }}
            serve_from_sub_path: false
        ingress:
          enabled: true
          hosts:
            - grafana.{{ ssl_local_domain }}
          path: /
          annotations:
            kubernetes.io/ingress.class: traefik
            traefik.ingress.kubernetes.io/router.entrypoints: websecure
            traefik.ingress.kubernetes.io/router.tls: "true"
        sidecar:
          dashboards:
            enabled: true
            label: grafana_dashboard
          datasources:
            enabled: true
            label: grafana_datasource

      alertmanager:
        enabled: false # Use Grafana alerting to save a pod
      vmalert:
        enabled: false

      kubelet:
        enabled: true
      kubeApiServer:
        enabled: true
      kubeStateMetrics:
        enabled: true
      prometheus-node-exporter:
        enabled: true
      kubeDns: { enabled: false }
      coreDns: { enabled: true }
